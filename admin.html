<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PitchScout — Beta Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #00e676;
      --dark:    #080f0a;
      --surface: #0d1a10;
      --card:    #111e14;
      --border:  #1e3324;
      --text:    #e8f5e9;
      --muted:   #6a9b78;
      --red:     #ef5350;
      --yellow:  #ffd600;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Auth screen ── */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 360px;
      text-align: center;
    }

    .auth-card h1 { font-size: 1.4rem; margin-bottom: 6px; }
    .auth-card p  { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }

    /* ── Admin app ── */
    #app { display: none; max-width: 760px; margin: 0 auto; padding: 40px 20px; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    header h1 { font-size: 1.3rem; }
    header h1 span { color: var(--green); }

    .badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 4px 12px;
      cursor: pointer;
    }
    .badge:hover { color: var(--red); border-color: var(--red); }

    /* ── Add form ── */
    .add-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 28px;
    }

    .add-card h2 { font-size: 0.95rem; color: var(--muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.06em; }

    .form-row { display: flex; gap: 10px; }

    input[type="email"], input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="email"] { flex: 1; }
    input[type="text"]  { flex: 0 0 180px; }
    input:focus { border-color: var(--green); }
    input::placeholder { color: var(--muted); }

    button {
      background: var(--green);
      border: none;
      border-radius: 7px;
      color: var(--dark);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 10px 20px;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.btn-danger { background: var(--red); color: #fff; font-size: 0.8rem; padding: 6px 14px; }

    .msg {
      font-size: 0.82rem;
      margin-top: 10px;
      min-height: 18px;
    }
    .msg.ok  { color: var(--green); }
    .msg.err { color: var(--red); }

    /* ── User list ── */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .list-header h2 { font-size: 0.95rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .count { color: var(--green); font-weight: 700; font-size: 0.9rem; }

    .user-list { display: flex; flex-direction: column; gap: 8px; }

    .user-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
    }

    .user-email { font-size: 0.9rem; font-weight: 500; }
    .user-meta  { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    .empty { color: var(--muted); font-size: 0.88rem; text-align: center; padding: 32px 0; }

    /* ── Auth input repurposed ── */
    .auth-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      width: 100%;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    .auth-input:focus { border-color: var(--green); }
    .auth-input::placeholder { color: var(--muted); }
    .auth-btn {
      width: 100%;
      background: var(--green);
      border: none;
      border-radius: 7px;
      color: var(--dark);
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 11px;
    }
    .auth-btn:hover { opacity: 0.85; }
    .auth-err { color: var(--red); font-size: 0.82rem; margin-top: 10px; min-height: 18px; }

    .logo { color: var(--green); font-size: 1.6rem; font-weight: 800; margin-bottom: 10px; }
  </style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="logo">⚽</div>
    <h1>PitchScout Admin</h1>
    <p>Enter your API key to continue</p>
    <input class="auth-input" type="password" id="auth-key" placeholder="API key" autocomplete="off" />
    <button class="auth-btn" id="auth-btn">Sign in</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- Admin app -->
<div id="app">
  <header>
    <h1>PitchScout <span>Beta Admin</span></h1>
    <div class="badge" id="signout-btn">Sign out</div>
  </header>

  <div class="add-card">
    <h2>Add beta tester</h2>
    <div class="form-row">
      <input type="email" id="add-email" placeholder="email@example.com" />
      <input type="text"  id="add-note"  placeholder="Note (optional)" maxlength="80" />
      <button id="add-btn">Add</button>
    </div>
    <div class="msg" id="add-msg"></div>
  </div>

  <div class="list-header">
    <h2>Approved testers</h2>
    <span class="count" id="user-count">—</span>
  </div>
  <div class="user-list" id="user-list">
    <div class="empty">Loading…</div>
  </div>
</div>

<script>
  const API_BASE = 'https://mdvmhkrsc3.execute-api.us-east-1.amazonaws.com';
  const SESSION_KEY = 'ps_admin_key';

  let apiKey = '';

  // ── Auth ──────────────────────────────────────────────────────────────────

  async function tryAuth(key) {
    const resp = await fetch(`${API_BASE}/admin/allowlist`, {
      headers: { 'x-api-key': key },
    });
    return resp.status !== 403;
  }

  document.getElementById('auth-btn').addEventListener('click', async () => {
    const key = document.getElementById('auth-key').value.trim();
    const errEl = document.getElementById('auth-err');
    if (!key) return;

    document.getElementById('auth-btn').disabled = true;
    errEl.textContent = '';

    const ok = await tryAuth(key).catch(() => false);
    if (ok) {
      sessionStorage.setItem(SESSION_KEY, key);
      apiKey = key;
      showApp();
    } else {
      errEl.textContent = 'Invalid API key.';
      document.getElementById('auth-btn').disabled = false;
    }
  });

  document.getElementById('auth-key').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('auth-btn').click();
  });

  document.getElementById('signout-btn').addEventListener('click', () => {
    sessionStorage.removeItem(SESSION_KEY);
    apiKey = '';
    document.getElementById('app').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('auth-key').value = '';
  });

  // ── Load list ─────────────────────────────────────────────────────────────

  async function loadList() {
    const resp = await fetch(`${API_BASE}/admin/allowlist`, {
      headers: { 'x-api-key': apiKey },
    });
    const data = await resp.json();
    const users = data.users || [];

    document.getElementById('user-count').textContent = users.length + ' approved';

    const list = document.getElementById('user-list');
    if (!users.length) {
      list.innerHTML = '<div class="empty">No beta testers yet.</div>';
      return;
    }

    list.innerHTML = users.map(u => `
      <div class="user-row" data-email="${u.email}">
        <div>
          <div class="user-email">${u.email}</div>
          <div class="user-meta">${u.note ? u.note + ' · ' : ''}Added ${u.added || '—'}</div>
        </div>
        <button class="btn-danger" data-remove="${u.email}">Remove</button>
      </div>
    `).join('');

    list.querySelectorAll('[data-remove]').forEach(btn => {
      btn.addEventListener('click', () => removeUser(btn.dataset.remove));
    });
  }

  // ── Add user ──────────────────────────────────────────────────────────────

  document.getElementById('add-btn').addEventListener('click', async () => {
    const email = document.getElementById('add-email').value.trim().toLowerCase();
    const note  = document.getElementById('add-note').value.trim();
    const msgEl = document.getElementById('add-msg');

    if (!email || !email.includes('@')) {
      msgEl.className = 'msg err';
      msgEl.textContent = 'Enter a valid email address.';
      return;
    }

    document.getElementById('add-btn').disabled = true;
    msgEl.className = 'msg';
    msgEl.textContent = '';

    const resp = await fetch(`${API_BASE}/admin/allowlist`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
      body: JSON.stringify({ email, note }),
    });
    const data = await resp.json();

    if (resp.ok) {
      msgEl.className = 'msg ok';
      msgEl.textContent = `${email} added.`;
      document.getElementById('add-email').value = '';
      document.getElementById('add-note').value = '';
      await loadList();
    } else {
      msgEl.className = 'msg err';
      msgEl.textContent = data.error || 'Failed to add user.';
    }
    document.getElementById('add-btn').disabled = false;
  });

  document.getElementById('add-email').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('add-btn').click();
  });

  // ── Remove user ───────────────────────────────────────────────────────────

  async function removeUser(email) {
    if (!confirm(`Remove ${email} from the beta list?`)) return;

    const resp = await fetch(`${API_BASE}/admin/allowlist`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
      body: JSON.stringify({ email }),
    });

    if (resp.ok) {
      await loadList();
    } else {
      const data = await resp.json();
      alert(data.error || 'Failed to remove user.');
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadList();
  }

  const saved = sessionStorage.getItem(SESSION_KEY);
  if (saved) {
    apiKey = saved;
    tryAuth(saved).then(ok => {
      if (ok) showApp();
      else sessionStorage.removeItem(SESSION_KEY);
    });
  }
</script>
</body>
</html>
