<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Menu — Jigga Jerk Joint</title>
<meta name="description" content="Full menu for Jigga Jerk Joint — jerk chicken, pork, seafood, sides, drinks, and desserts." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/jjj.css" />
<style>
.page-hero {
  background: linear-gradient(160deg, #FFFFFF 0%, #F2FCF6 55%, #FFFEF5 100%);
  border-bottom: 3px solid var(--green);
  padding: 110px 5% 50px;
  text-align: center;
}
.page-hero .section-title { color: var(--green); }
.page-hero .section-subtitle { color: var(--ink-mid); }
.menu-sticky {
  position: sticky;
  top: 66px;
  z-index: 50;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(0,155,58,0.15);
  padding: 0 5%;
}
.menu-section-title {
  font-family: 'Oswald', system-ui;
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 1.2rem;
  padding-bottom: 10px;
  border-bottom: 2px solid rgba(0,155,58,0.20);
  display: flex;
  align-items: center;
  gap: 10px;
}
.menu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.2rem;
  margin-bottom: 3rem;
}
.menu-item {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
  transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
  box-shadow: 0 1px 8px rgba(0,0,0,0.05);
}
.menu-item:hover {
  border-color: rgba(212,56,13,0.25);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(212,56,13,0.10);
}
.menu-item-emoji {
  font-size: 2.2rem;
  flex-shrink: 0;
  width: 50px;
  text-align: center;
}
.menu-item-body { flex: 1; }
.menu-item-name { font-size: 1rem; font-weight: 700; color: var(--ink); margin-bottom: 5px; }
.menu-item-desc { font-size: 0.85rem; color: var(--ink-mid); line-height: 1.5; margin-bottom: 8px; }
.menu-item-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.menu-item-price { font-size: 1.05rem; font-weight: 700; color: var(--pepper); }
.menu-item-badges { display: flex; gap: 4px; flex-wrap: wrap; }

.order-cta-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--green);
  padding: 14px 5%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  z-index: 80;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}
.order-cta-bar.visible { transform: translateY(0); }
.order-cta-bar-text { font-size: 0.95rem; font-weight: 600; color: var(--cream); }
.order-cta-bar-text span { opacity: 0.8; font-weight: 400; font-size: 0.85rem; margin-left: 8px; }

@media print {
  .navbar, .menu-sticky, .order-cta-bar, .page-hero .btn { display: none !important; }
  .page-hero { padding: 20px 5% 30px; }
  body { background: white; color: black; }
  .menu-item { border-color: #ccc; background: white; }
  .menu-item-name, .menu-section-title { color: black; }
  .menu-item-price { color: #8B0000; }
  .menu-item-desc { color: #444; }
  .section { padding: 30px 5%; }
}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <img src="img/logo.jpg" alt="Jigga Jerk Joint" class="nav-logo-img" />
    <span class="logo-wordmark"><span class="fire">Jigga</span> <span class="gold">Jerk</span> <span class="grn">Joint</span></span>
  </a>
  <div class="nav-links" id="nav-links">
    <a href="menu.html" style="color:var(--gold)">Menu</a>
    <a href="catering.html">Catering</a>
    <a href="index.html#hours">Hours</a>
    <a href="index.html#about">About</a>
    <a href="#" id="nav-doordash" class="nav-cta">🛵 Order Now</a>
  </div>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="jamaica-stripe"></div>

<div class="page-hero">
  <div class="section-title">Our Menu</div>
  <p class="section-subtitle">All items marinated in-house. Ask about daily specials.</p>
  <div class="flex-center gap-2 mt-2">
    <a href="#" id="hero-doordash" class="btn btn-primary">🛵 Order on DoorDash</a>
    <a href="catering.html" class="btn btn-outline">Book Catering</a>
    <button onclick="window.print()" class="btn btn-outline btn-sm" style="display:inline-flex;align-items:center;gap:6px;">🖨️ Print Menu</button>
  </div>
</div>

<!-- Sticky category nav -->
<div class="menu-sticky">
  <div class="tabs-bar" id="category-tabs" style="max-width:1140px;margin:0 auto;"></div>
</div>

<section class="section" style="padding-top:2rem;padding-bottom:100px;">
  <div class="section-inner">
    <div id="menu-content"><div class="spinner"></div></div>
  </div>
</section>

<!-- Order floating bar -->
<div class="order-cta-bar" id="order-bar">
  <div class="order-cta-bar-text">
    Ready to order?
    <span>Delivery available via DoorDash</span>
  </div>
  <a href="#" id="bar-doordash" class="btn btn-gold">🛵 Open DoorDash</a>
</div>

<div class="jamaica-stripe"></div>
<footer class="site-footer" style="border-top:none;">
  <div style="max-width:1140px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
    <span class="footer-copy">© 2026 Jigga Jerk Joint</span>
    <div class="flex gap-2">
      <a href="index.html" style="color:var(--muted-hi);font-size:0.9rem;">Home</a>
      <a href="catering.html" style="color:var(--muted-hi);font-size:0.9rem;">Catering</a>
      <a href="index.html#hours" style="color:var(--muted-hi);font-size:0.9rem;">Hours</a>
    </div>
  </div>
</footer>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/animations.js" defer></script>
<script>
document.getElementById("nav-hamburger").addEventListener("click", () => {
  document.getElementById("nav-links").classList.toggle("open");
});

// Show order bar after scroll
window.addEventListener("scroll", () => {
  const bar = document.getElementById("order-bar");
  if (window.scrollY > 300) bar.classList.add("visible");
  else bar.classList.remove("visible");
}, { passive: true });

const CATEGORY_ICONS = {
  "Jerk Chicken": "🍗",
  "Jerk Pork":    "🥩",
  "Seafood":      "🐟",
  "Sides":        "🍚",
  "Drinks":       "🍹",
  "Desserts":     "🍰",
};

async function renderMenu() {
  const settings = await getSiteSettings();
  const doordash  = settings.doordashUrl || "https://www.doordash.com";
  document.getElementById("hero-doordash").href = doordash;
  document.getElementById("bar-doordash").href  = doordash;
  document.getElementById("nav-doordash").href  = doordash;

  const items = await getMenuItems();
  const categories = [...new Set(items.map(i => i.category))];

  // Build tabs
  const tabsBar = document.getElementById("category-tabs");
  tabsBar.innerHTML = categories.map((cat, idx) => `
    <button class="tab-btn ${idx===0?"active":""}" data-cat="${cat}" onclick="filterCat(this,'${cat}')">
      ${CATEGORY_ICONS[cat]||"🍽️"} ${cat}
    </button>
  `).join("") + `<button class="tab-btn" data-cat="all" onclick="filterCat(this,'all')">View All</button>`;

  // Build all sections
  const content = document.getElementById("menu-content");
  let globalIdx = 0;
  content.innerHTML = categories.map(cat => {
    const catItems = items.filter(i => i.category === cat);
    return `
      <div class="menu-category-section" data-cat="${cat}">
        <div class="menu-section-title">${CATEGORY_ICONS[cat]||"🍽️"} ${cat}</div>
        <div class="menu-grid">
          ${catItems.map(item => {
            const delay = (globalIdx++ % 6) * 55;
            return `
            <div class="menu-item" style="transition-delay:${delay}ms">
              <div class="menu-item-emoji">${item.emoji||"🍽️"}</div>
              <div class="menu-item-body">
                <div class="menu-item-name">${item.name}</div>
                <div class="menu-item-desc">${item.description}</div>
                <div class="menu-item-footer">
                  <span class="menu-item-price">$${parseFloat(item.price).toFixed(2)}</span>
                  <div class="menu-item-badges">
                    ${item.spicy      ? '<span class="badge badge-spicy">🌶 Spicy</span>'  : ""}
                    ${item.glutenFree ? '<span class="badge badge-gf">GF</span>'           : ""}
                    ${item.vegan      ? '<span class="badge badge-vegan">🌿 Vegan</span>' : ""}
                  </div>
                </div>
              </div>
            </div>
            `;
          }).join("")}
        </div>
      </div>
    `;
  }).join("");
}

function filterCat(btn, cat) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  document.querySelectorAll(".menu-category-section").forEach(sec => {
    sec.style.display = (cat === "all" || sec.dataset.cat === cat) ? "block" : "none";
  });

  if (cat !== "all") {
    const target = document.querySelector(`.menu-category-section[data-cat="${cat}"]`);
    if (target) setTimeout(() => target.scrollIntoView({ behavior:"smooth", block:"start" }), 50);
  }
}

renderMenu().then(() => { if (window.revealFresh) window.revealFresh(); });
</script>
</body>
</html>
